<!DOCTYPE html>
<html>
<head>
    <title>CPM Turbo Copy Pro - Multi Mode</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #0b0b0b; color: #fff; font-family: sans-serif; text-align: center; padding: 15px; }
        .box { max-width: 550px; margin: auto; background: #151515; padding: 20px; border-radius: 12px; border: 1px solid #00ffcc; box-shadow: 0 0 15px rgba(0,255,204,0.2); }
        h2 { color: #00ffcc; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        textarea { width: 100%; height: 150px; background: #202020; color: #00ff00; border: 1px solid #333; border-radius: 5px; padding: 10px; box-sizing: border-box; margin-bottom: 10px; font-family: monospace; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; background: #202020; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #00ffcc; }
        .mode-selector { background: #252525; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px dashed #444; }
        button { width: 100%; padding: 15px; background: #00ffcc; color: #000; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #00ccaa; }
        .res-area { margin-top: 20px; text-align: left; background: #000; padding: 10px; border-radius: 5px; border: 1px solid #222; }
        #status { height: 130px; overflow-y: auto; font-family: monospace; font-size: 11px; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        #successList { height: 150px; width: 100%; background: #111; color: #00ffcc; border: 1px solid #00ffcc; border-radius: 5px; padding: 8px; font-size: 12px; }
        .suc { color: #00ff00; }
        .err { color: #ff3333; }
        .copy-btn { background: #00ffcc; color: #000; padding: 8px 15px; font-size: 13px; font-weight: bold; margin-top: 10px; cursor: pointer; border-radius: 5px; display: inline-block; }
    </style>
</head>
<body>

<div class="box">
    <h2>⚡ CPM TURBO MASTER</h2>
    
    <div class="mode-selector">
        <label style="font-size: 12px; color: #aaa;">SELECT MODE:</label>
        <select id="workMode" onchange="toggleInputs()">
            <option value="pass">Only Pass Change</option>
            <option value="email">Only Email Change (Auto-Number)</option>
            <option value="both">Both (Email & Pass Change)</option>
        </select>
    </div>

    <textarea id="list" placeholder="Email:OldPass (Paste list here)"></textarea>
    
    <div id="emailFields" style="display:none;">
        <input type="text" id="baseEmail" placeholder="New Email Base (e.g., flame)">
        <input type="number" id="startNum" placeholder="Starting Number (e.g., 1)" value="1">
    </div>
    
    <input type="text" id="newpass" placeholder="New Password to Set">
    
    <select id="ver">
        <option value="AIzaSyCQDz9rgjgmvmFkvVfmvr2-7fT4tfrzRRQ">CPM 2 (Recommended)</option>
        <option value="AIzaSyAe_aOVT1gSfmHKBrorFvX4fRwN5nODXVA">CPM 1</option>
    </select>

    <button onclick="startTurbo()">🚀 START PROCESS</button>

    <div class="res-area">
        <div id="status">Logs will appear here...</div>
        <p style="font-size: 12px; color: #00ffcc; margin: 5px 0;">✅ SUCCESS LIST:</p>
        <textarea id="successList" readonly placeholder="Result will appear here..."></textarea>
        <center><div class="copy-btn" onclick="copyResult()">📋 COPY SUCCESS LIST</div></center>
    </div>
</div>

<script>
    function toggleInputs() {
        let mode = document.getElementById('workMode').value;
        let emailFields = document.getElementById('emailFields');
        let passField = document.getElementById('newpass');
        
        emailFields.style.display = (mode === 'email' || mode === 'both') ? 'block' : 'none';
        passField.placeholder = (mode === 'email') ? "Current Password (Required for login)" : "Enter New Password to Set";
    }

    async function startTurbo() {
        let mode = document.getElementById('workMode').value;
        let listStr = document.getElementById('list').value.trim();
        let newP = document.getElementById('newpass').value.trim();
        let baseE = document.getElementById('baseEmail').value.trim();
        let startN = parseInt(document.getElementById('startNum').value);
        let key = document.getElementById('ver').value;
        let log = document.getElementById('status');
        let successBox = document.getElementById('successList');

        if (!listStr || (mode !== 'email' && !newP)) { alert("Data missing!"); return; }

        let list = listStr.split('\n');
        log.innerHTML = `🚀 Mode: ${mode.toUpperCase()} | Count: ${list.length}<br>`;
        successBox.value = ""; 

        for (let i = 0; i < list.length; i++) {
            let line = list[i].trim();
            if (!line.includes(':')) continue;
            let [oldE, oldP] = line.split(':');
            
            // Target Data setup based on mode
            let targetEmail = (mode === 'email' || mode === 'both') ? `${baseE}${startN + i}@gmail.com` : oldE.trim();
            let targetPass = (mode === 'pass' || mode === 'both') ? newP : oldP.trim();

            await processAcc(oldE.trim(), oldP.trim(), targetEmail, targetPass, mode, key, log, successBox);
            await new Promise(r => setTimeout(r, 100));
        }
    }

    async function processAcc(e, p, targetE, targetP, mode, key, log, successBox) {
        try {
            // 1. Login
            let res1 = await fetch(`https://www.googleapis.com/identitytoolkit/v3/relyingparty/verifyPassword?key=${key}`, {
                method: 'POST',
                body: JSON.stringify({ email: e, password: p, returnSecureToken: true }),
                headers: { 'Content-Type': 'application/json' }
            });
            let d1 = await res1.json();

            if (d1.idToken) {
                let updateData = { idToken: d1.idToken, returnSecureToken: true };
                
                if (mode === 'pass') updateData.password = targetP;
                else if (mode === 'email') updateData.email = targetE;
                else if (mode === 'both') { updateData.email = targetE; updateData.password = targetP; }

                // 2. Update
                let res2 = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:update?key=${key}`, {
                    method: 'POST',
                    body: JSON.stringify(updateData),
                    headers: { 'Content-Type': 'application/json' }
                });

                if (res2.ok) {
                    log.innerHTML += `<span class="suc">✅ OK: ${e} -> ${targetE}</span><br>`;
                    successBox.value += `${targetE}:${targetP}\n`;
                } else {
                    log.innerHTML += `<span class="err">❌ UPDATE FAIL: ${e}</span><br>`;
                }
            } else {
                log.innerHTML += `<span class="err">⚠️ LOGIN ERROR: ${e}</span><br>`;
            }
        } catch (err) {
            log.innerHTML += `<span class="err">❗ ERROR: ${e}</span><br>`;
        }
        log.scrollTop = log.scrollHeight;
    }

    function copyResult() {
        let copyText = document.getElementById("successList");
        copyText.select();
        document.execCommand("copy");
        alert("Copied!");
    }
</script>

</body>
</html>
