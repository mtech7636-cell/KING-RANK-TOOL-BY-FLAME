<!DOCTYPE html>
<html>
<head>
    <title>CPM Pass Changer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #0f0f0f; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .box { max-width: 600px; margin: auto; background: #1a1a1a; padding: 25px; border-radius: 15px; border: 1px solid #333; }
        h2 { color: #bb86fc; margin-bottom: 20px; }
        
        /* 500 അക്കൗണ്ട്സ് കൊള്ളുന്ന സ്പേസ് */
        textarea { 
            width: 100%; height: 250px; background: #252525; color: #00ff00; 
            border: 1px solid #444; border-radius: 8px; padding: 10px; font-family: monospace;
            resize: vertical; margin-bottom: 15px;
        }

        /* ന്യൂ പാസ്‌വേഡ് സ്പേസ് */
        input { 
            width: 100%; padding: 12px; margin-bottom: 20px; background: #252525; 
            border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box;
        }

        /* ചേഞ്ച് പാസ്‌വേഡ് ബട്ടൺ */
        button { 
            width: 100%; padding: 15px; background: #03dac6; color: #000; 
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px;
        }
        button:hover { background: #018786; }

        #status { margin-top: 20px; text-align: left; background: #000; padding: 10px; border-radius: 8px; max-height: 200px; overflow-y: auto; font-size: 13px; }
        .suc { color: #4caf50; }
        .err { color: #f44336; }
    </style>
</head>
<body>

<div class="box">
    <h2>👑 KING PASS CHANGER</h2>
    
    <textarea id="list" placeholder="Email:Pass (ഓരോ വരിയിലും ഓരോന്ന് വീതം 500 എണ്ണം വരെ പേസ്റ്റ് ചെയ്യാം)"></textarea>
    
    <input type="text" id="newpass" placeholder="Enter New Password Here">
    
    <select id="ver" style="width:100%; padding:10px; margin-bottom:15px; background:#252525; color:white; border-radius:8px; border:1px solid #444;">
        <option value="AIzaSyCQDz9rgjgmvmFkvVfmvr2-7fT4tfrzRRQ">CPM 2 (Fastest)</option>
        <option value="AIzaSyAe_aOVT1gSfmHKBrorFvX4fRwN5nODXVA">CPM 1</option>
    </select>

    <button onclick="start()">🔥 CHANGE PASSWORDS NOW</button>

    <div id="status">റിസൾട്ട് ഇവിടെ കാണാം...</div>
</div>

<script>
    async function start() {
        let list = document.getElementById('list').value.trim().split('\n');
        let newP = document.getElementById('newpass').value.trim();
        let key = document.getElementById('ver').value;
        let log = document.getElementById('status');

        if (!list[0] || !newP) { alert("അക്കൗണ്ട് ലിസ്റ്റും പുതിയ പാസ്‌വേഡും നൽകുക!"); return; }

        log.innerHTML = "<b>🚀 പ്രോസസ്സ് തുടങ്ങുന്നു...</b><br>";

        for (let acc of list) {
            if (!acc.includes(':')) continue;
            let [e, p] = acc.split(':');
            e = e.trim(); p = p.trim();

            try {
                // ലോഗിൻ
                let res1 = await fetch(`https://www.googleapis.com/identitytoolkit/v3/relyingparty/verifyPassword?key=${key}`, {
                    method: 'POST',
                    body: JSON.stringify({ email: e, password: p, returnSecureToken: true }),
                    headers: { 'Content-Type': 'application/json' }
                });
                let data1 = await res1.json();

                if (data1.idToken) {
                    // പാസ്‌വേഡ് മാറ്റുന്നു
                    let res2 = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:update?key=${key}`, {
                        method: 'POST',
                        body: JSON.stringify({ idToken: data1.idToken, password: newP, returnSecureToken: true }),
                        headers: { 'Content-Type': 'application/json' }
                    });

                    if (res2.ok) {
                        log.innerHTML += `<span class="suc">✅ DONE: ${e}</span><br>`;
                    } else {
                        log.innerHTML += `<span class="err">❌ FAILED: ${e}</span><br>`;
                    }
                } else {
                    log.innerHTML += `<span class="err">⚠️ LOGIN ERROR: ${e}</span><br>`;
                }
            } catch (err) {
                log.innerHTML += `<span class="err">❗ ERROR: ${e}</span><br>`;
            }
            // ഗൂഗിൾ ബ്ലോക്ക് ചെയ്യാതിരിക്കാൻ ചെറിയ ഡിലേ
            await new Promise(r => setTimeout(r, 400));
            log.scrollTop = log.scrollHeight;
        }
        log.innerHTML += "<b>🏁 എല്ലാം കഴിഞ്ഞു!</b>";
    }
</script>

</body>
</html>
